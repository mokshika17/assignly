{% extends "base.html" %}
{% block title %}Sign Up — Assignly{% endblock %}

{% block content %}
<article style="max-width: 420px; margin: 4rem auto;">
  <h2>Create your account</h2>

  {% if error %}
  <p style="color: var(--pico-color-red-500);">{{ error }}</p>
  {% endif %}

  <form method="post" action="/signup">
    <label>Full Name
      <input type="text" name="name" required autofocus />
    </label>
    <label>Email
      <input type="email" name="email" required />
    </label>
    <label>Password
      <input type="password" name="password" required minlength="8" />
    </label>
    <!--  role is hardcoded to member; admins are created via backend only -->
    <input type="hidden" name="role" value="member" />
    <button type="submit">Create account</button>
  </form>

  <p style="margin-top: 1rem;">Already have an account? <a href="/login">Log in</a></p>
</article>
{% endblock %}
